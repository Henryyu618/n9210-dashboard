let currentRange = 7;
let customFrom = null, customTo = null;

function parseDate(mmdd) {
  const [m, d] = mmdd.split('/').map(Number);
  const year = new Date().getFullYear();
  return new Date(year, m - 1, d);
}

function getFilteredData(arr) {
  if (!arr.length) return [];
  if (customFrom && customTo) {
    return arr.filter(r => {
      const d = parseDate(r[0]);
      return d >= customFrom && d <= customTo;
    });
  }
  if (currentRange === 0) return arr.slice();
  return arr.slice(-currentRange);
}

function setRange(n) {
  currentRange = n;
  customFrom = null; customTo = null;
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.querySelectorAll('.range-bar button').forEach(b => b.classList.remove('active'));
  const id = n === 0 ? 'btnAll' : 'btn' + n;
  document.getElementById(id).classList.add('active');
  render();
}

function setCustomRange() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (f && t) {
    customFrom = new Date(f);
    customTo = new Date(t);
    document.querySelectorAll('.range-bar button').forEach(b => b.classList.remove('active'));
    render();
  }
}

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0, 0, 0, 0);
  return dt;
}

function getWeekStats(data, weekMonday, weekEnd) {
  return data.filter(r => {
    const d = parseDate(r[0]);
    return d >= weekMonday && d <= weekEnd;
  });
}

function getMonthStats(data, year, month) {
  return data.filter(r => {
    const d = parseDate(r[0]);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

function calcMetrics(rows) {
  if (!rows.length) return null;
  const n = rows.length;
  const dau = rows.reduce((s, r) => s + r[1], 0) / n;
  const rev = rows.reduce((s, r) => s + r[2], 0) / n;
  const cr = rows.reduce((s, r) => s + r[3], 0) / n;
  const arppu = rows.reduce((s, r) => s + r[4], 0) / n;
  const pay = rows.reduce((s, r) => s + r[5], 0) / n;
  const arpu = dau > 0 ? rev / (dau > 0 ? dau : 1) : 0;
  return { dau, rev, cr, arpu, arppu, pay };
}

function calcNewUserMetrics(rows) {
  if (!rows.length) return null;
  const n = rows.length;
  const newU = rows.reduce((s, r) => s + r[1], 0) / n;
  const d1Rows = rows.filter(r => r[2] !== null && r[2] !== undefined && r[2] !== '');
  const d1 = d1Rows.length ? d1Rows.reduce((s, r) => s + r[2], 0) / d1Rows.length : null;
  return { newU, d1 };
}

function calcRetUserMetrics(rows) {
  if (!rows.length) return null;
  const n = rows.length;
  const ret = rows.reduce((s, r) => s + r[1], 0) / n;
  return { ret };
}

function fmtChange(cur, prev) {
  if (!prev || prev === 0) return { text: '--', cls: '' };
  const pct = ((cur - prev) / Math.abs(prev) * 100).toFixed(1);
  if (pct > 0) return { text: '↑' + pct + '%', cls: 'up' };
  if (pct < 0) return { text: '↓' + Math.abs(pct) + '%', cls: 'down' };
  return { text: '0%', cls: '' };
}

function fmtNum(v, dec) {
  if (v === null || v === undefined) return '--';
  return Number(v).toFixed(dec !== undefined ? dec : 0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function detectAlerts(opsRows, newRetRows) {
  const alerts = [];
  if (opsRows.length < 8) return alerts;
  const recent7 = opsRows.slice(-7);
  const prev7 = opsRows.slice(-14, -7);
  if (prev7.length < 7) return alerts;

  const rDau = recent7.reduce((s, r) => s + r[1], 0) / 7;
  const pDau = prev7.reduce((s, r) => s + r[1], 0) / 7;
  const dauChg = (rDau - pDau) / pDau;
  if (Math.abs(dauChg) > 0.10) alerts.push({ level: 'critical', msg: `DAU周均变化 ${(dauChg*100).toFixed(1)}% (${fmtNum(pDau,0)} → ${fmtNum(rDau,0)})` });
  else if (Math.abs(dauChg) > 0.05) alerts.push({ level: 'warn', msg: `DAU周均变化 ${(dauChg*100).toFixed(1)}%` });

  const rRev = recent7.reduce((s, r) => s + r[2], 0) / 7;
  const pRev = prev7.reduce((s, r) => s + r[2], 0) / 7;
  const revChg = pRev > 0 ? (rRev - pRev) / pRev : 0;
  if (revChg < -0.25) alerts.push({ level: 'critical', msg: `流水周均下跌 ${(revChg*100).toFixed(1)}% ($${fmtNum(pRev,0)} → $${fmtNum(rRev,0)})` });
  else if (revChg < -0.20) alerts.push({ level: 'warn', msg: `流水周均下跌 ${(revChg*100).toFixed(1)}%` });

  if (newRetRows.length >= 8) {
    const rNew = newRetRows.slice(-7).reduce((s, r) => s + r[1], 0) / 7;
    const pNew = newRetRows.slice(-14, -7);
    if (pNew.length >= 7) {
      const pNewAvg = pNew.reduce((s, r) => s + r[1], 0) / 7;
      const newChg = pNewAvg > 0 ? (rNew - pNewAvg) / pNewAvg : 0;
      if (Math.abs(newChg) > 0.10) alerts.push({ level: 'warn', msg: `新增用户周均变化 ${(newChg*100).toFixed(1)}%` });
    }
    const latestRet = newRetRows.filter(r => r[2] !== null && r[2] !== undefined && r[2] !== '').slice(-1);
    if (latestRet.length) {
      const d1 = latestRet[0][2];
      if (d1 < 25) alerts.push({ level: 'critical', msg: `次留 ${d1.toFixed(1)}% 严重偏低 (阈值25%)` });
      else if (d1 < 29) alerts.push({ level: 'warn', msg: `次留 ${d1.toFixed(1)}% 偏低 (阈值29%)` });
    }
  }
  return alerts;
}

function renderAlerts(opsRows, newRetRows) {
  const alerts = detectAlerts(opsRows, newRetRows);
  const section = document.getElementById('alertSection');
  if (!alerts.length) { section.innerHTML = ''; return; }
  const crits = alerts.filter(a => a.level === 'critical');
  const warns = alerts.filter(a => a.level === 'warn');
  let html = '';
  if (crits.length) {
    html += `<div class="alert-box critical"><h3>⚠ 严重异常</h3><ul>${crits.map(a => `<li>${a.msg}</li>`).join('')}</ul></div>`;
  }
  if (warns.length) {
    html += `<div class="alert-box"><h3>⚡ 关注项</h3><ul>${warns.map(a => `<li>${a.msg}</li>`).join('')}</ul></div>`;
  }
  section.innerHTML = html;
}

function renderCompare() {
  if (!opsData.length) { document.getElementById('compareBody').innerHTML = '<tr><td colspan="7">暂无数据</td></tr>'; return; }
  const latestDate = parseDate(opsData[opsData.length - 1][0]);
  const thisMonday = getMonday(latestDate);
  const thisWeekEnd = new Date(latestDate);
  const lastMonday = new Date(thisMonday); lastMonday.setDate(lastMonday.getDate() - 7);
  const lastSunday = new Date(thisMonday); lastSunday.setDate(lastSunday.getDate() - 1);

  const thisWeek = getWeekStats(opsData, thisMonday, thisWeekEnd);
  const lastWeek = getWeekStats(opsData, lastMonday, lastSunday);
  const thisMonth = getMonthStats(opsData, latestDate.getFullYear(), latestDate.getMonth());
  const prevMonthDate = new Date(latestDate.getFullYear(), latestDate.getMonth() - 1, 1);
  const lastMonth = getMonthStats(opsData, prevMonthDate.getFullYear(), prevMonthDate.getMonth());

  const tw = calcMetrics(thisWeek);
  const lw = calcMetrics(lastWeek);
  const tm = calcMetrics(thisMonth);
  const lm = calcMetrics(lastMonth);

  const thisWeekNew = getWeekStats(newRetData, thisMonday, thisWeekEnd);
  const lastWeekNew = getWeekStats(newRetData, lastMonday, lastSunday);
  const thisMonthNew = getMonthStats(newRetData, latestDate.getFullYear(), latestDate.getMonth());
  const lastMonthNew = getMonthStats(newRetData, prevMonthDate.getFullYear(), prevMonthDate.getMonth());
  const twn = calcNewUserMetrics(thisWeekNew);
  const lwn = calcNewUserMetrics(lastWeekNew);
  const tmn = calcNewUserMetrics(thisMonthNew);
  const lmn = calcNewUserMetrics(lastMonthNew);

  const thisWeekRet = getWeekStats(retUserData, thisMonday, thisWeekEnd);
  const lastWeekRet = getWeekStats(retUserData, lastMonday, lastSunday);
  const thisMonthRet = getMonthStats(retUserData, latestDate.getFullYear(), latestDate.getMonth());
  const lastMonthRet = getMonthStats(retUserData, prevMonthDate.getFullYear(), prevMonthDate.getMonth());
  const twr = calcRetUserMetrics(thisWeekRet);
  const lwr = calcRetUserMetrics(lastWeekRet);
  const tmr = calcRetUserMetrics(thisMonthRet);
  const lmr = calcRetUserMetrics(lastMonthRet);

  function row(label, twV, lwV, tmV, lmV, dec, prefix, suffix) {
    prefix = prefix || ''; suffix = suffix || '';
    const wow = fmtChange(twV, lwV);
    const mom = fmtChange(tmV, lmV);
    return `<tr><td style="text-align:left;font-weight:500">${label}</td>
      <td>${prefix}${fmtNum(twV, dec)}${suffix}</td><td>${prefix}${fmtNum(lwV, dec)}${suffix}</td><td class="${wow.cls}">${wow.text}</td>
      <td>${prefix}${fmtNum(tmV, dec)}${suffix}</td><td>${prefix}${fmtNum(lmV, dec)}${suffix}</td><td class="${mom.cls}">${mom.text}</td></tr>`;
  }

  let html = '';
  html += row('DAU日均', tw?.dau, lw?.dau, tm?.dau, lm?.dau, 0);
  html += row('流水日均', tw?.rev, lw?.rev, tm?.rev, lm?.rev, 0, '$');
  html += row('充值率', tw?.cr, lw?.cr, tm?.cr, lm?.cr, 2, '', '%');
  html += row('ARPU', tw?.arpu, lw?.arpu, tm?.arpu, lm?.arpu, 2, '$');
  html += row('ARPPU', tw?.arppu, lw?.arppu, tm?.arppu, lm?.arppu, 2, '$');
  html += row('新增用户日均', twn?.newU, lwn?.newU, tmn?.newU, lmn?.newU, 0);
  html += row('回流用户日均', twr?.ret, lwr?.ret, tmr?.ret, lmr?.ret, 0);
  html += row('新增次留均', twn?.d1, lwn?.d1, tmn?.d1, lmn?.d1, 2, '', '%');

  document.getElementById('compareBody').innerHTML = html;
}

let charts = {};
function renderCharts() {
  const data = getFilteredData(opsData);
  const labels = data.map(r => r[0]);

  function makeChart(id, label, dataArr, color, yPrefix, ySuffix) {
    if (charts[id]) charts[id].destroy();
    const ctx = document.getElementById(id).getContext('2d');
    charts[id] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{ label: label, data: dataArr, borderColor: color, backgroundColor: color + '20', tension: 0.3, fill: true, pointRadius: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { callback: v => (yPrefix || '') + v.toLocaleString() + (ySuffix || '') } },
          x: { ticks: { maxRotation: 0 } }
        }
      }
    });
  }

  makeChart('chartRevenue', '充值额', data.map(r => r[2]), '#4a6cf7', '$');
  makeChart('chartChargeRate', '充值率', data.map(r => r[3]), '#ff7043', '', '%');
  makeChart('chartARPU', 'ARPU', data.map(r => r[1] > 0 ? (r[2] / r[1]).toFixed(2) : 0), '#26a69a', '$');
  makeChart('chartARPPU', 'ARPPU', data.map(r => r[4]), '#ab47bc', '$');
  makeChart('chartDAU', 'DAU', data.map(r => r[1]), '#42a5f5');
}

function renderRetTable() {
  const data = getFilteredData(newRetData);
  let html = '';
  data.forEach(r => {
    const d1 = r[2] !== null && r[2] !== undefined && r[2] !== '' ? r[2] : null;
    const d3 = r[3] !== null && r[3] !== undefined && r[3] !== '' ? r[3] : null;
    const d7 = r[4] !== null && r[4] !== undefined && r[4] !== '' ? r[4] : null;
    html += `<tr><td>${r[0]}</td><td>${fmtNum(r[1])}</td>
      <td><span class="ret-cell ${retClass(d1)}">${d1 !== null ? d1.toFixed(2) + '%' : '--'}</span></td>
      <td><span class="ret-cell ${retClass(d3)}">${d3 !== null ? d3.toFixed(2) + '%' : '--'}</span></td>
      <td><span class="ret-cell ${retClass(d7)}">${d7 !== null ? d7.toFixed(2) + '%' : '--'}</span></td></tr>`;
  });
  document.getElementById('retBody').innerHTML = html || '<tr><td colspan="5">暂无数据</td></tr>';
}

function retClass(v) {
  if (v === null || v === undefined) return '';
  if (v >= 40) return 'ret-4';
  if (v >= 30) return 'ret-3';
  if (v >= 20) return 'ret-2';
  return 'ret-1';
}

function render() {
  if (opsData.length) {
    document.getElementById('dataDate').textContent = opsData[opsData.length - 1][0];
  }
  renderCompare();
  renderAlerts(opsData, newRetData);
  renderCharts();
  renderRetTable();
}

// ===== TAB SWITCHING =====
let currentTab = 'ops';
let currentOS = 'ios';
let adRange = 7;
let adCustomFrom = null, adCustomTo = null;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('section-ops').style.display = tab === 'ops' ? '' : 'none';
  document.getElementById('section-ads').style.display = tab === 'ads' ? '' : 'none';
  document.getElementById('tabOps').className = 'tab' + (tab === 'ops' ? ' active' : '');
  document.getElementById('tabAds').className = 'tab' + (tab === 'ads' ? ' active' : '');
  document.getElementById('rangeBarOps').style.display = tab === 'ops' ? 'flex' : 'none';
  document.getElementById('rangeBarAds').style.display = tab === 'ads' ? 'flex' : 'none';
  if (tab === 'ads') renderAdTab();
}

function switchOS(os) {
  currentOS = os;
  document.getElementById('osBtnIOS').style.background = os === 'ios' ? '#4a6cf7' : '#fff';
  document.getElementById('osBtnIOS').style.color = os === 'ios' ? '#fff' : '#333';
  document.getElementById('osBtnAndroid').style.background = os === 'android' ? '#4a6cf7' : '#fff';
  document.getElementById('osBtnAndroid').style.color = os === 'android' ? '#fff' : '#333';
  renderAdChannelTable();
}

function setAdRange(n) {
  adRange = n;
  adCustomFrom = null; adCustomTo = null;
  document.getElementById('adDateFrom').value = '';
  document.getElementById('adDateTo').value = '';
  ['adBtn7','adBtn14','adBtn30','adBtnAll'].forEach(id => {
    document.getElementById(id).className = '';
  });
  document.getElementById(n === 0 ? 'adBtnAll' : 'adBtn' + n).className = 'active';
  renderAdTab();
}

function setAdCustomRange() {
  const from = document.getElementById('adDateFrom').value;
  const to = document.getElementById('adDateTo').value;
  if (from && to) {
    adCustomFrom = from.slice(5).replace('-', '/');
    adCustomTo = to.slice(5).replace('-', '/');
    ['adBtn7','adBtn14','adBtn30','adBtnAll'].forEach(id => {
      document.getElementById(id).className = '';
    });
    adRange = -1;
    renderAdTab();
  }
}

function getAdFilteredData(arr) {
  if (!arr.length) return [];
  if (adRange === -1 && adCustomFrom && adCustomTo) {
    return arr.filter(r => r[0] >= adCustomFrom && r[0] <= adCustomTo);
  }
  if (adRange === 0) return arr;
  return arr.slice(-adRange);
}

function renderAdTab() {
  populateChannelDatePicker();
  renderAdOverview();
  renderAdChannelTable();
  renderAdCharts();
}

function populateChannelDatePicker() {
  const dates = [...new Set(adsChannelIOS.concat(adsChannelAndroid).map(r => r[0]))].sort();
  const filtered = getAdFilteredData(dates.map(d => [d])).map(r => r[0]);
  const picker = document.getElementById('channelDatePicker');
  const prev = picker.value;
  picker.innerHTML = filtered.map(d => `<option value="${d}">${d}</option>`).join('');
  if (filtered.includes(prev)) picker.value = prev;
  else if (filtered.length) picker.value = filtered[filtered.length - 1];
}

function renderAdOverview() {
  const data = getAdFilteredData(adsOverview);
  if (!data.length) {
    document.getElementById('adOverviewCards').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#999;padding:20px;">暂无广告数据</div>';
    return;
  }
  function sumCol(idx) {
    let t = 0;
    data.forEach(r => { const v = parseFloat(String(r[idx]).replace(/,/g, '')); if (!isNaN(v)) t += v; });
    return t;
  }
  function avgPctCol(idx) {
    let vals = [];
    data.forEach(r => { const s = String(r[idx]); const v = parseFloat(s.replace(/%.*/, '')); if (!isNaN(v) && s !== '--') vals.push(v); });
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) + '%' : '--';
  }
  const totalSpend = sumCol(1);
  const totalNew = sumCol(2);
  const totalReflow = sumCol(4);
  const totalConv = sumCol(6);
  const newCost = totalNew > 0 ? (totalSpend / totalNew).toFixed(2) : '--';
  const convCost = totalConv > 0 ? (totalSpend / totalConv).toFixed(2) : '--';
  const roi1 = avgPctCol(8);
  const ret2 = avgPctCol(10);
  const ret3 = avgPctCol(11);
  const periodLabel = data.length > 1 ? `(${data[0][0]}~${data[data.length-1][0]}, ${data.length}天)` : `(${data[0][0]})`;
  const cards = [
    { label: '总花费', value: '$' + fmtNum(totalSpend, 0), color: '#4a6cf7' },
    { label: '总新增账号', value: fmtNum(totalNew, 0), color: '#26a69a' },
    { label: '平均新增成本', value: newCost !== '--' ? '$' + newCost : '--', color: '#ff7043' },
    { label: '总转化账号', value: fmtNum(totalConv, 0), color: '#ab47bc' },
    { label: '平均转化成本', value: convCost !== '--' ? '$' + convCost : '--', color: '#42a5f5' },
    { label: '平均ROI1', value: roi1, color: '#66bb6a' },
    { label: '平均转化次留', value: ret2, color: '#ffa726' },
    { label: '平均转化3留', value: ret3, color: '#ef5350' },
  ];
  let html = `<div style="grid-column:1/-1;font-size:12px;color:#888;margin-bottom:-4px;">${periodLabel}</div>`;
  cards.forEach(c => {
    html += `<div style="background:#f8f9fc;border-radius:8px;padding:16px;text-align:center;border-left:3px solid ${c.color}">
      <div style="font-size:12px;color:#888;margin-bottom:6px;">${c.label}</div>
      <div style="font-size:18px;font-weight:600;color:#333;">${c.value}</div>
    </div>`;
  });
  document.getElementById('adOverviewCards').innerHTML = html;
}

function renderAdChannelTable() {
  const src = currentOS === 'ios' ? adsChannelIOS : adsChannelAndroid;
  const selectedDate = document.getElementById('channelDatePicker').value;
  if (!selectedDate || !src.length) {
    document.getElementById('adChannelBody').innerHTML = '<tr><td colspan="10" style="color:#999;">暂无数据</td></tr>';
    return;
  }
  let rows = src.filter(r => r[0] === selectedDate);
  rows.sort((a, b) => {
    const spendA = parseFloat(String(a[2]).replace(/,/g, '')) || 0;
    const spendB = parseFloat(String(b[2]).replace(/,/g, '')) || 0;
    return spendB - spendA;
  });
  if (!rows.length) {
    document.getElementById('adChannelBody').innerHTML = '<tr><td colspan="10" style="color:#999;">该日期无数据</td></tr>';
    return;
  }
  let html = '';
  rows.forEach(r => {
    html += `<tr><td>${r[1]}</td><td>${r[2] || '--'}</td><td>${r[3] || '--'}</td><td>${r[4] || '--'}</td><td>${r[5] || '--'}</td><td>${r[6] || '--'}</td><td>${r[7] || '--'}</td><td>${r[8] || '--'}</td><td>${r[9] || '--'}</td><td>${r[10] || '--'}</td></tr>`;
  });
  document.getElementById('adChannelBody').innerHTML = html;
}

let adCharts = {};
function renderAdCharts() {
  const data = getAdFilteredData(adsOverview);
  if (!data.length) return;
  const labels = data.map(r => r[0]);

  function makeAdChart(id, label, dataArr, color, yPrefix) {
    if (adCharts[id]) adCharts[id].destroy();
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    adCharts[id] = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ label, data: dataArr, borderColor: color, backgroundColor: color + '20', tension: 0.3, fill: true, pointRadius: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { y: { ticks: { callback: v => (yPrefix || '') + v.toLocaleString() } }, x: { ticks: { maxRotation: 0 } } } }
    });
  }

  makeAdChart('chartAdSpend', '花费', data.map(r => parseFloat(String(r[1]).replace(/,/g, '')) || 0), '#4a6cf7', '$');
  makeAdChart('chartAdNew', '新增', data.map(r => parseFloat(String(r[2]).replace(/,/g, '')) || 0), '#26a69a');
  makeAdChart('chartAdCost', '转化成本', data.map(r => parseFloat(String(r[7]).replace(/,/g, '')) || 0), '#ff7043', '$');
  makeAdChart('chartAdROI', 'ROI1', data.map(r => parseFloat(String(r[8]).replace(/%/g, '')) || 0), '#66bb6a');
}

render();
</script>
